name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: liveprobe_test
          POSTGRES_USER: liveprobe
          POSTGRES_PASSWORD: liveprobe
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U liveprobe -d liveprobe_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgres://liveprobe:liveprobe@127.0.0.1:5432/liveprobe_test
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm from packageManager
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            python/sdk/pyproject.toml
            demo/billing-worker/requirements.txt

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Install Node dependencies
        run: |
          pnpm install --frozen-lockfile
          npm --prefix demo/payment-service ci

      - name: Install Python dependencies
        run: |
          python -m venv python/sdk/.venv
          python/sdk/.venv/bin/python -m pip install --upgrade pip
          python/sdk/.venv/bin/python -m pip install \
            -e "python/sdk[test]" \
            -r demo/billing-worker/requirements.txt

      - name: Run tests
        run: make test

      - name: Run security audits
        run: |
          make redaction-audit
          make readonly-audit

      - name: Build all components
        run: make build

      - name: Verify publishable artifacts
        run: |
          (cd packages/mcp-server && npm pack --dry-run)
          (cd packages/sdk-node && npm pack --dry-run)
          python/sdk/.venv/bin/python -m pip wheel --no-deps --wheel-dir /tmp/liveprobe-wheel python/sdk
          mvn --file java/bridge/pom.xml verify
