name: Publish SDK packages

on:
  workflow_dispatch:
    inputs:
      package:
        description: SDK package to build or publish
        required: true
        default: all
        type: choice
        options:
          - all
          - node
          - python
          - jvm
      dry_run:
        description: Build and inspect packages without publishing
        required: true
        default: true
        type: boolean

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  node:
    if: ${{ inputs.package == 'all' || inputs.package == 'node' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/sdk-node
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - run: npm install --ignore-scripts --no-audit --no-fund
      - run: npm run build
      - run: npm test
      - run: npm pack --dry-run
      - if: ${{ !inputs.dry_run }}
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  python:
    if: ${{ inputs.package == 'all' || inputs.package == 'python' }}
    runs-on: ubuntu-latest
    environment: pypi
    defaults:
      run:
        working-directory: python/sdk
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade build pytest twine
      - run: python -m pytest
      - run: python -m build
      - run: python -m twine check dist/*
      - if: ${{ !inputs.dry_run }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/sdk/dist/

  jvm:
    if: ${{ inputs.package == 'all' || inputs.package == 'jvm' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN
      - run: mvn --file java/bridge/pom.xml verify
      - if: ${{ !inputs.dry_run }}
        run: mvn --file java/bridge/pom.xml deploy -DskipTests
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
