services:
  broker:
    ports: !override
      - "0.0.0.0:${BROKER_PORT:-80}:7070"

  payment-service:
    ports: !override
      - "127.0.0.1:${PAYMENT_PORT:-8080}:8080"

  billing-worker:
    ports: !override
      - "127.0.0.1:${BILLING_PORT:-8081}:8081"

  inventory-service:
    ports: !override
      - "127.0.0.1:${INVENTORY_PORT:-8082}:8080"

  mcp-server:
    profiles: !override
      - mcp

networks:
  jvm-diagnostics:
    internal: true
